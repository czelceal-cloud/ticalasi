<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TICALASI V6 — Identity Decomposition</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
:root{
  --explore:rgba(140,80,200,0.15);
  --works:rgba(60,120,240,0.15);
  --ai:rgba(200,50,160,0.15);
  --about:rgba(255,120,50,0.15);
  --explore-border:rgba(140,80,200,0.5);
  --works-border:rgba(60,120,240,0.5);
  --ai-border:rgba(200,50,160,0.5);
  --about-border:rgba(255,120,50,0.5);
  --explore-icon:#a050d0;
  --works-icon:#3c78f0;
  --ai-icon:#c832a0;
  --about-icon:#ff7832;
  --bg:#0a0a12;
  --text:#e8e8f0;
  --text-dim:rgba(232,232,240,0.5);
  --glass:rgba(255,255,255,0.06);
  --glass-border:rgba(255,255,255,0.12);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif}
#webgl-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
#app{position:relative;width:100%;height:100%;z-index:1}

/* ── MENU ── */
.menu{position:fixed;top:28px;left:50%;transform:translateX(-50%);display:flex;gap:18px;z-index:100;align-items:center}
.menu-item{width:42px;height:42px;border-radius:12px;background:var(--glass);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .35s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:relative;overflow:hidden}
.menu-item::before{content:'';position:absolute;inset:0;border-radius:12px;opacity:0;transition:opacity .3s}
.menu-item:nth-child(1)::before{background:radial-gradient(circle,rgba(255,120,50,0.25),transparent 70%)}
.menu-item:nth-child(2)::before{background:radial-gradient(circle,rgba(140,80,200,0.25),transparent 70%)}
.menu-item:nth-child(3)::before{background:radial-gradient(circle,rgba(60,120,240,0.25),transparent 70%)}
.menu-item:nth-child(4)::before{background:radial-gradient(circle,rgba(200,50,160,0.25),transparent 70%)}
.menu-item:nth-child(5)::before{background:radial-gradient(circle,rgba(255,80,60,0.25),transparent 70%)}
.menu-item:hover::before,.menu-item.active::before{opacity:1}
.menu-item:hover{transform:scale(1.15);border-color:rgba(255,255,255,0.25)}
.menu-item.active{transform:scale(1.15);border-color:rgba(255,255,255,0.3)}
.menu-item:nth-child(1){color:#ff7832}
.menu-item:nth-child(2){color:#a050d0}
.menu-item:nth-child(3){color:#3c78f0}
.menu-item:nth-child(4){color:#c832a0}
.menu-item:nth-child(5){color:#ff5040}

/* ── LEFT SLOGAN ── */
.slogan{position:fixed;left:28px;top:50%;transform:translateY(-50%) rotate(-90deg);transform-origin:center;z-index:50;white-space:nowrap;pointer-events:none}
.slogan-line{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--text-dim);transition:opacity .6s}
.slogan-line:nth-child(2){margin-top:6px;font-size:9px;letter-spacing:3px}

/* ── CHARACTER SHATTER CONTAINER ── */
#shatterContainer{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:380px;height:380px;z-index:10;cursor:pointer;perspective:800px}
#shatterContainer.shattered{pointer-events:none}

/* Each shard: a div showing the FULL image but clipped to its region */
.shard{position:absolute;top:0;left:0;width:100%;height:100%;background-image:url(char-main.jpg);background-size:cover;background-position:center;transition:transform .8s cubic-bezier(.16,1,.3,1),opacity .8s cubic-bezier(.16,1,.3,1),filter .8s cubic-bezier(.16,1,.3,1);will-change:transform,opacity,filter;backface-visibility:hidden}

/* Shard clip paths — 3x3 grid */
.shard:nth-child(1){clip-path:polygon(0% 0%,33.33% 0%,33.33% 33.33%,0% 33.33%);--tx:-220px;--ty:-180px;--rot:-55deg}
.shard:nth-child(2){clip-path:polygon(33.33% 0%,66.66% 0%,66.66% 33.33%,33.33% 33.33%);--tx:10px;--ty:-230px;--rot:40deg}
.shard:nth-child(3){clip-path:polygon(66.66% 0%,100% 0%,100% 33.33%,66.66% 33.33%);--tx:240px;--ty:-160px;--rot:65deg}
.shard:nth-child(4){clip-path:polygon(0% 33.33%,33.33% 33.33%,33.33% 66.66%,0% 66.66%);--tx:-250px;--ty:20px;--rot:-35deg}
.shard:nth-child(5){clip-path:polygon(33.33% 33.33%,66.66% 33.33%,66.66% 66.66%,33.33% 66.66%);--tx:0px;--ty:0px;--rot:10deg;--scale:0.1}
.shard:nth-child(6){clip-path:polygon(66.66% 33.33%,100% 33.33%,100% 66.66%,66.66% 66.66%);--tx:260px;--ty:30px;--rot:50deg}
.shard:nth-child(7){clip-path:polygon(0% 66.66%,33.33% 66.66%,33.33% 100%,0% 100%);--tx:-200px;--ty:200px;--rot:-70deg}
.shard:nth-child(8){clip-path:polygon(33.33% 66.66%,66.66% 66.66%,66.66% 100%,33.33% 100%);--tx:20px;--ty:240px;--rot:45deg}
.shard:nth-child(9){clip-path:polygon(66.66% 66.66%,100% 66.66%,100% 100%,66.66% 100%);--tx:220px;--ty:190px;--rot:80deg}

/* Hover glow on shards */
#shatterContainer:not(.shattered) .shard{transition:transform .2s,filter .2s}
#shatterContainer:not(.shattered):hover .shard{filter:brightness(1.15) drop-shadow(0 0 8px rgba(255,255,255,0.15))}

/* Shard fly-out state */
.shard.fly{transform:translate(var(--tx),var(--ty)) rotate(var(--rot)) scale(var(--scale,0.25));opacity:0;filter:blur(4px) brightness(1.5)}

/* Shard delay stagger */
.shard:nth-child(1).fly{transition-delay:0ms}
.shard:nth-child(2).fly{transition-delay:50ms}
.shard:nth-child(3).fly{transition-delay:100ms}
.shard:nth-child(4).fly{transition-delay:60ms}
.shard:nth-child(5).fly{transition-delay:0ms}
.shard:nth-child(6).fly{transition-delay:70ms}
.shard:nth-child(7).fly{transition-delay:120ms}
.shard:nth-child(8).fly{transition-delay:80ms}
.shard:nth-child(9).fly{transition-delay:110ms}

/* ── CHARACTER GHOST (stays visible after shatter) ── */
#charGhost{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:380px;height:380px;z-index:5;background-image:url(char-main.jpg);background-size:cover;background-position:center;border-radius:20px;opacity:0;transition:opacity 1s ease 0.6s;pointer-events:none;filter:brightness(0.6) saturate(0.5)}
#charGhost.visible{opacity:0.35}

/* ── GLASS MODULES ── */
.module{position:fixed;width:78px;height:78px;border-radius:18px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:20;transition:left 1s cubic-bezier(.16,1,.3,1),top 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1),opacity 1s cubic-bezier(.16,1,.3,1),box-shadow .4s,background .4s;font-size:13px;font-weight:500;letter-spacing:1px;text-transform:uppercase}
.module:hover{transform:scale(1.12)!important;box-shadow:0 0 30px rgba(255,255,255,0.1)}
.module.explore{background:var(--explore);border-color:var(--explore-border)}
.module.works{background:var(--works);border-color:var(--works-border)}
.module.ai{background:var(--ai);border-color:var(--ai-border)}
.module.about{background:var(--about);border-color:var(--about-border)}
.module .mod-icon{font-size:22px;margin-bottom:2px}
.module .mod-label{font-size:9px;opacity:0.7;letter-spacing:1.5px}

/* Module states */
.state-home .module{left:50%;top:50%;transform:translate(-50%,-50%) scale(0.4);opacity:0;pointer-events:none}
.state-explore .m1{left:18%;top:30%;opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.state-explore .m2{left:40%;top:65%;opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.state-explore .m3{left:70%;top:40%;opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.state-explore .m4{left:55%;top:75%;opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.state-works .m1{left:70%;top:25%;opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.state-works .m2{left:30%;top:40%;opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.state-works .m3{left:60%;top:70%;opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.state-works .m4{left:45%;top:55%;opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.state-ai .m1{left:25%;top:25%;opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.state-ai .m2{left:70%;top:60%;opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.state-ai .m3{left:50%;top:45%;opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.state-ai .m4{left:30%;top:75%;opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.state-about .m1{left:20%;top:70%;opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.state-about .m2{left:60%;top:30%;opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.state-about .m3{left:50%;top:55%;opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.state-about .m4{left:75%;top:50%;opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}

/* Module icon colors */
.module.explore .mod-icon{color:var(--explore-icon)}
.module.works .mod-icon{color:var(--works-icon)}
.module.ai .mod-icon{color:var(--ai-icon)}
.module.about .mod-icon{color:var(--about-icon)}

/* ── GLASS BUTTONS (bottom) ── */
.glass-btns{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:50;opacity:0;pointer-events:none;transition:opacity .6s ease}
.glass-btns.visible{opacity:1;pointer-events:auto}
.glass-btn{padding:10px 18px;border-radius:14px;border:1px solid rgba(255,255,255,0.12);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);font-size:11px;font-weight:500;cursor:pointer;transition:all .3s cubic-bezier(.16,1,.3,1);letter-spacing:0.5px;white-space:nowrap;position:relative;overflow:hidden}
.glass-btn::before{content:'';position:absolute;inset:0;border-radius:14px;opacity:0;transition:opacity .3s}
.glass-btn:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.glass-btn:hover::before{opacity:1}
.glass-btn:nth-child(1){background:rgba(200,50,160,0.1);color:#e88ac0}.glass-btn:nth-child(1)::before{background:rgba(200,50,160,0.15)}
.glass-btn:nth-child(2){background:rgba(60,120,240,0.1);color:#8ab8f8}.glass-btn:nth-child(2)::before{background:rgba(60,120,240,0.15)}
.glass-btn:nth-child(3){background:rgba(255,200,50,0.1);color:#f0d080}.glass-btn:nth-child(3)::before{background:rgba(255,200,50,0.15)}
.glass-btn:nth-child(4){background:rgba(255,160,50,0.1);color:#f0b070}.glass-btn:nth-child(4)::before{background:rgba(255,160,50,0.15)}
.glass-btn:nth-child(5){background:rgba(50,180,180,0.1);color:#80d0d0}.glass-btn:nth-child(5)::before{background:rgba(50,180,180,0.15)}

/* ── INFO PANEL ── */
.info-panel{position:fixed;right:40px;top:50%;transform:translateY(-50%);width:300px;z-index:30;opacity:0;pointer-events:none;transition:opacity .6s,transform .6s cubic-bezier(.16,1,.3,1);background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:30px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.info-panel.visible{opacity:1;pointer-events:auto;transform:translateY(-50%) translateX(0)}
.info-panel.hidden{transform:translateY(-50%) translateX(30px)}
.panel-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;display:inline-block;padding:4px 12px;border-radius:8px;background:rgba(255,255,255,0.08)}
.panel-title{font-size:24px;font-weight:700;margin-bottom:6px;line-height:1.3}
.panel-subtitle{font-size:13px;color:var(--text-dim);margin-bottom:20px}
.panel-btn{display:inline-block;padding:10px 24px;border-radius:12px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;transition:all .3s;letter-spacing:1px}
.panel-btn:hover{background:rgba(255,255,255,0.12);transform:translateY(-2px)}

/* Panel color themes */
.panel-explore .panel-label{color:var(--explore-icon);background:rgba(140,80,200,0.15)}
.panel-explore .panel-title{background:linear-gradient(135deg,#c060f0,#8040d0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.panel-works .panel-label{color:var(--works-icon);background:rgba(60,120,240,0.15)}
.panel-works .panel-title{background:linear-gradient(135deg,#60a0f0,#3060c0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.panel-ai .panel-label{color:var(--ai-icon);background:rgba(200,50,160,0.15)}
.panel-ai .panel-title{background:linear-gradient(135deg,#f060c0,#c030a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.panel-about .panel-label{color:var(--about-icon);background:rgba(255,120,50,0.15)}
.panel-about .panel-title{background:linear-gradient(135deg,#ffa060,#ff7030);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ── CLICK PROMPT ── */
.click-prompt{position:fixed;top:50%;left:50%;transform:translate(-50%,120px);z-index:15;font-size:12px;color:var(--text-dim);letter-spacing:2px;animation:pulse 2s ease-in-out infinite;pointer-events:none;transition:opacity .5s}
.click-prompt.hidden{opacity:0}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}

/* ── RESET BUTTON ── */
.reset-btn{position:fixed;top:28px;right:28px;z-index:100;padding:8px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--text-dim);font-size:11px;cursor:pointer;transition:all .3s;letter-spacing:1px;opacity:0;pointer-events:none}
.reset-btn.visible{opacity:1;pointer-events:auto}
.reset-btn:hover{background:rgba(255,255,255,0.1);color:var(--text);transform:scale(1.05)}

/* ── SCENE LABEL ── */
.scene-label{position:fixed;left:28px;bottom:28px;z-index:50;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--text-dim);transition:opacity .5s}
.scene-label.hidden{opacity:0}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #shatterContainer{width:260px;height:260px}
  #charGhost{width:260px;height:260px}
  .module{width:60px;height:60px;border-radius:14px;font-size:11px}
  .module .mod-icon{font-size:18px}
  .module .mod-label{font-size:7px}
  .glass-btns{flex-wrap:wrap;justify-content:center;max-width:90vw}
  .glass-btn{padding:8px 12px;font-size:10px}
  .info-panel{width:260px;right:16px;padding:20px}
  .panel-title{font-size:18px}
  .slogan{display:none}
  .menu{top:16px;gap:10px}
  .menu-item{width:36px;height:36px;font-size:15px}
}
</style>
</head>
<body>

<!-- WebGL Canvas -->
<canvas id="webgl-bg"></canvas>

<div id="app" class="state-home">

  <!-- Menu -->
  <nav class="menu">
    <div class="menu-item" data-scene="explore" title="Explore">◆</div>
    <div class="menu-item" data-scene="works" title="Works">◇</div>
    <div class="menu-item" data-scene="ai" title="AI">▣</div>
    <div class="menu-item" data-scene="about" title="About">⬡</div>
    <div class="menu-item" data-scene="home" title="Home">△</div>
  </nav>

  <!-- Left Slogan -->
  <div class="slogan">
    <div class="slogan-line">CODE IS ENERGY</div>
    <div class="slogan-line">CREATION IS FREEDOM</div>
  </div>

  <!-- Character Shatter Container -->
  <div id="shatterContainer">
    <div class="shard"></div>
    <div class="shard"></div>
    <div class="shard"></div>
    <div class="shard"></div>
    <div class="shard"></div>
    <div class="shard"></div>
    <div class="shard"></div>
    <div class="shard"></div>
    <div class="shard"></div>
  </div>

  <!-- Character Ghost (stays visible) -->
  <div id="charGhost"></div>

  <!-- Glass Modules -->
  <div class="module explore m1"><div class="mod-icon">◆</div><div class="mod-label">EXPLORE</div></div>
  <div class="module works m2"><div class="mod-icon">◇</div><div class="mod-label">WORKS</div></div>
  <div class="module ai m3"><div class="mod-icon">▣</div><div class="mod-label">AI</div></div>
  <div class="module about m4"><div class="mod-icon">⬡</div><div class="mod-label">ABOUT</div></div>

  <!-- Click Prompt -->
  <div class="click-prompt" id="clickPrompt">CLICK TO DECOMPOSE</div>

  <!-- Reset Button -->
  <button class="reset-btn" id="resetBtn">↺ REBUILD</button>

  <!-- Glass Buttons (bottom) -->
  <div class="glass-btns" id="glassBtns">
    <div class="glass-btn">角色设定</div>
    <div class="glass-btn">故事线</div>
    <div class="glass-btn">情绪板</div>
    <div class="glass-btn">交互细节</div>
    <div class="glass-btn">创意导航</div>
  </div>

  <!-- Scene Label -->
  <div class="scene-label hidden" id="sceneLabel">HOME</div>

  <!-- Info Panel -->
  <div class="info-panel" id="infoPanel">
    <div class="panel-label" id="panelLabel">SCENE</div>
    <div class="panel-title" id="panelTitle">Title</div>
    <div class="panel-subtitle" id="panelSubtitle">Chinese subtitle</div>
    <div class="panel-btn" id="panelBtn">VIEW DETAILS →</div>
  </div>

</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  'use strict';

  // ── STATE ──
  let shattered = false;
  let currentScene = 'home';

  const sceneData = {
    explore: {
      label: 'EXPLORE', title: '探索世界', subtitle: 'Explore the boundaries of creativity and technology',
      panelClass: 'panel-explore', btnColor: 'rgba(140,80,200,0.3)'
    },
    works: {
      label: 'WORKS', title: '作品集', subtitle: 'A collection of experimental digital experiences',
      panelClass: 'panel-works', btnColor: 'rgba(60,120,240,0.3)'
    },
    ai: {
      label: 'AI STUDIO', title: '人工智能', subtitle: 'Where machine learning meets artistic expression',
      panelClass: 'panel-ai', btnColor: 'rgba(200,50,160,0.3)'
    },
    about: {
      label: 'ABOUT', title: '关于我', subtitle: 'The mind behind the code — passion meets precision',
      panelClass: 'panel-about', btnColor: 'rgba(255,120,50,0.3)'
    }
  };

  // ── DOM ──
  const app = document.getElementById('app');
  const container = document.getElementById('shatterContainer');
  const shards = document.querySelectorAll('.shard');
  const ghost = document.getElementById('charGhost');
  const prompt = document.getElementById('clickPrompt');
  const resetBtn = document.getElementById('resetBtn');
  const glassBtns = document.getElementById('glassBtns');
  const panel = document.getElementById('infoPanel');
  const panelLabel = document.getElementById('panelLabel');
  const panelTitle = document.getElementById('panelTitle');
  const panelSubtitle = document.getElementById('panelSubtitle');
  const sceneLabel = document.getElementById('sceneLabel');
  const modules = document.querySelectorAll('.module');
  const menuItems = document.querySelectorAll('.menu-item');

  // ── SHATTER ──
  container.addEventListener('click', function(){
    if(shattered) return;
    shattered = true;
    container.classList.add('shattered');
    prompt.classList.add('hidden');
    resetBtn.classList.add('visible');

    // Fly shards outward
    shards.forEach(s => s.classList.add('fly'));

    // Show ghost after shards fly
    setTimeout(()=> ghost.classList.add('visible'), 300);

    // Show glass buttons
    setTimeout(()=> glassBtns.classList.add('visible'), 800);
  });

  // ── RESET ──
  resetBtn.addEventListener('click', function(){
    shattered = false;
    currentScene = 'home';
    container.classList.remove('shattered');
    shards.forEach(s => s.classList.remove('fly'));
    ghost.classList.remove('visible');
    prompt.classList.remove('hidden');
    resetBtn.classList.remove('visible');
    glassBtns.classList.remove('visible');
    panel.classList.remove('visible','hidden');
    panel.className = 'info-panel';
    sceneLabel.classList.add('hidden');
    app.className = 'state-home';
    menuItems.forEach(m => m.classList.remove('active'));
  });

  // ── SCENE SWITCHING ──
  function setScene(scene){
    if(!shattered) return;
    if(scene === currentScene) {
      // Toggle off
      currentScene = 'home';
      app.className = 'state-home';
      panel.classList.remove('visible');
      panel.classList.add('hidden');
      sceneLabel.classList.add('hidden');
      menuItems.forEach(m => m.classList.remove('active'));
      return;
    }
    currentScene = scene;
    const data = sceneData[scene];
    app.className = 'state-' + scene;

    // Update panel
    panel.className = 'info-panel ' + data.panelClass + ' visible';
    panelLabel.textContent = data.label;
    panelTitle.textContent = data.title;
    panelSubtitle.textContent = data.subtitle;
    document.querySelector('.' + data.panelClass + ' .panel-btn').style.background = data.btnColor;

    // Scene label
    sceneLabel.textContent = data.label;
    sceneLabel.classList.remove('hidden');

    // Menu active
    menuItems.forEach(m => {
      m.classList.toggle('active', m.dataset.scene === scene);
    });
  }

  menuItems.forEach(m => {
    m.addEventListener('click', ()=> setScene(m.dataset.scene));
  });

  modules.forEach(m => {
    m.addEventListener('click', function(){
      const cls = [...this.classList].find(c => sceneData[c]);
      if(cls) setScene(cls);
    });
  });

  // ── WEBGL PARTICLE BACKGROUND ──
  const canvas = document.getElementById('webgl-bg');
  let gl, program, particles, uTime, uScene, uMouse;
  let mouseX = 0, mouseY = 0;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX / window.innerWidth;
    mouseY = 1.0 - e.clientY / window.innerHeight;
  });

  function initWebGL(){
    try {
      gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
      if(!gl) return;
    } catch(e){ return; }

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const vsSource = `
      attribute vec2 aPosition;
      attribute float aSize;
      attribute float aSeed;
      uniform float uTime;
      uniform float uScene;
      varying float vAlpha;
      varying float vSeed;
      void main(){
        float t = uTime * 0.3;
        vec2 pos = aPosition;
        // Gentle swirl
        float angle = t + aSeed * 6.283;
        float r = 0.15 + 0.1 * sin(aSeed * 3.14 + t * 0.5);
        pos.x += sin(angle + aPosition.y * 3.0) * r * 0.3;
        pos.y += cos(angle + aPosition.x * 3.0) * r * 0.3;
        // Scene influence
        float sceneOffset = uScene * 0.5;
        pos.x += sin(t + sceneOffset) * 0.05;
        pos.y += cos(t + sceneOffset) * 0.05;
        gl_Position = vec4(pos, 0.0, 1.0);
        gl_PointSize = aSize * (1.0 + 0.3 * sin(t + aSeed * 10.0));
        vAlpha = 0.3 + 0.3 * sin(aSeed * 6.28 + t * 2.0);
        vSeed = aSeed;
      }
    `;
    const fsSource = `
      precision mediump float;
      varying float vAlpha;
      varying float vSeed;
      uniform float uTime;
      void main(){
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        if(d > 0.5) discard;
        float glow = 1.0 - smoothstep(0.0, 0.5, d);
        vec3 col = mix(
          vec3(0.4, 0.3, 0.8),
          vec3(0.8, 0.3, 0.6),
          vSeed
        );
        col = mix(col, vec3(0.3, 0.6, 0.9), sin(vSeed * 20.0 + uTime) * 0.3 + 0.3);
        gl_FragColor = vec4(col, glow * vAlpha * 0.6);
      }
    `;

    function compileShader(src, type){
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
        console.warn('Shader error:', gl.getShaderInfoLog(s));
        return null;
      }
      return s;
    }

    const vs = compileShader(vsSource, gl.VERTEX_SHADER);
    const fs = compileShader(fsSource, gl.FRAGMENT_SHADER);
    if(!vs || !fs) return;

    program = gl.createProgram();
    gl.attachShader(program, vs);
    gl.attachShader(program, fs);
    gl.linkProgram(program);
    if(!gl.getProgramParameter(program, gl.LINK_STATUS)){
      console.warn('Program link error');
      return;
    }
    gl.useProgram(program);

    // Generate particles
    const COUNT = 8000;
    const positions = new Float32Array(COUNT * 2);
    const sizes = new Float32Array(COUNT);
    const seeds = new Float32Array(COUNT);

    for(let i = 0; i < COUNT; i++){
      positions[i*2] = (Math.random() - 0.5) * 2;
      positions[i*2+1] = (Math.random() - 0.5) * 2;
      sizes[i] = Math.random() * 3 + 0.5;
      seeds[i] = Math.random();
    }

    function createBuffer(data, attr, size){
      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
      const loc = gl.getAttribLocation(program, attr);
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, size, gl.FLOAT, false, 0, 0);
      return buf;
    }

    createBuffer(positions, 'aPosition', 2);
    createBuffer(sizes, 'aSize', 1);
    createBuffer(seeds, 'aSeed', 1);

    uTime = gl.getUniformLocation(program, 'uTime');
    uScene = gl.getUniformLocation(program, 'uScene');
    uMouse = gl.getUniformLocation(program, 'uMouse');

    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

    animateGL();
  }

  function animateGL(){
    if(!gl) return;
    const t = performance.now() * 0.001;
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.clearColor(0.04, 0.04, 0.07, 1);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(program);
    gl.uniform1f(uTime, t);
    gl.uniform1f(uScene, currentScene === 'home' ? 0 :
      currentScene === 'explore' ? 1 :
      currentScene === 'works' ? 2 :
      currentScene === 'ai' ? 3 : 4);
    if(uMouse) gl.uniform2f(uMouse, mouseX, mouseY);
    gl.drawArrays(gl.POINTS, 0, 8000);
    requestAnimationFrame(animateGL);
  }

  window.addEventListener('resize', ()=>{
    if(canvas){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
  });

  initWebGL();

})();
</script>
