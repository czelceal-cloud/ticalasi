<!DOCTYPE html>

<head>

    <style>

        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

<body class="bg-gray-50 text-gray-900">
    <header class="bg-white border-b sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="/" class="text-2xl font-bold gradient-text">ticalasi</a>
            <nav class="flex gap-6 text-sm text-gray-600">
                <a href="/" class="hover:text-gray-900">首页</a>
                <a href="/articles" class="hover:text-gray-900">文章</a>

    <main class="max-w-5xl mx-auto px-4 py-8">

                <p class="text-gray-400 col-span-2">内容加载中...</p>

    <footer class="border-t mt-16 py-8 text-center text-sm text-gray-400">

    <script>
        const ARTICLES = [
            {

                summary: "研究人员提出了一种新型注意力机制，在大规模推理任务中实现了显著性能提升，同时降低了计算成本。",
                date: "2026-05-03",
                tags: ["大模型", "架构创新"]
            },
            {
                title: "多模态AI模型迎来统一架构时代",
                summary: "最新研究展示了一种统一的视觉-语言模型架构，可在图像、视频、文本间无缝转换推理。",
                date: "2026-05-02",

            {

                date: "2026-05-01",
                tags: ["Agent", "自主系统"]
            },
            {
                title: "开源LLM性能逼近闭源模型",
                summary: "最新开源大语言模型在多项基准测试中达到与顶尖闭源模型相当的水平，开源生态加速发展。",
                date: "2026-04-30",
                tags: ["开源", "LLM"]
            }
        ];

        document.getElementById('articles').innerHTML = ARTICLES.map(a => `
            <article class="bg-white rounded-lg shadow-sm p-6 border cursor-pointer">
                <div class="flex gap-2 mb-3 flex-wrap">
                    ${a.tags.map(t => `<span class="text-xs bg-purple-50 text-purple-600 px-2 py-0.5 rounded">${t}</span>`).join('')}
                </div>
                <h3 class="font-semibold mb-2">${a.title}</h3>
                <p class="text-sm text-gray-600 mb-3">${a.summary}</p>
                <span class="text-xs text-gray-400">${a.date}</span>
            </article>
        `).join('');
