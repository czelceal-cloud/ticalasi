<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ticalasi — 全球科技前沿</title>
    <meta name="description" content="全球最新科技资讯与大事件自动聚合。">
    <meta property="og:title" content="ticalasi — 全球科技前沿">
    <meta property="og:description" content="全球最新科技资讯与大事件自动聚合。">
    <meta name="theme-color" content="#fafafa">
    <link rel="canonical" href="https://ticalasi.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
        }
        .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }

        /* 导航 */
        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 0; border-bottom: 1px solid #e8e8e8; margin-bottom: 80px;
        }
        .logo { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; color: #1a1a1a; text-decoration: none; }
        .nav-links { display: flex; gap: 24px; }
        .nav-links a { font-size: 14px; color: #888; text-decoration: none; transition: color 0.2s; }
        .nav-links a:hover { color: #1a1a1a; }

        /* 头部 */
        .hero { margin-bottom: 64px; }
        .hero h1 { font-size: 40px; font-weight: 700; letter-spacing: -1px; line-height: 1.15; margin-bottom: 16px; }
        .hero p { font-size: 16px; color: #888; max-width: 480px; }

        /* 文章列表 */
        .articles { display: flex; flex-direction: column; gap: 48px; margin-bottom: 80px; }
        article { cursor: pointer; }
        article .meta { font-size: 13px; color: #aaa; margin-bottom: 8px; display: flex; gap: 12px; align-items: center; }
        article .tag { font-size: 11px; color: #666; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        article h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.2px; margin-bottom: 8px; line-height: 1.4; }
        article h2 a { color: #1a1a1a; text-decoration: none; transition: color 0.2s; }
        article h2 a:hover { color: #555; }
        article .summary { font-size: 15px; color: #888; line-height: 1.6; }

        /* Footer */
        footer { border-top: 1px solid #e8e8e8; padding: 32px 0; display: flex; justify-content: space-between; font-size: 13px; color: #aaa; }
        footer a { color: #888; text-decoration: none; }
        footer a:hover { color: #1a1a1a; }

        @media (max-width: 600px) {
            .container { padding: 0 16px; }
            nav { margin-bottom: 48px; }
            .hero h1 { font-size: 28px; }
            .articles { gap: 36px; }
            footer { flex-direction: column; gap: 8px; }
        }

        /* 推荐站点 - 藏子世间 */
        .featured-site {
            margin-bottom: 64px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 32px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .featured-site:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .featured-inner {
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }
        .featured-icon {
            font-size: 28px;
            line-height: 1;
            color: #d4a853;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .featured-info h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #e8d5b7;
        }
        .featured-info p {
            font-size: 14px;
            color: #999;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        .featured-link {
            font-size: 13px;
            color: #d4a853;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .featured-link:hover {
            color: #f0d080;
        }
        @media (max-width: 600px) {
            .featured-site { padding: 20px; }
            .featured-inner { flex-direction: column; gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="/" class="logo">ticalasi</a>
            <div class="nav-links">
                <a href="/">文章</a>
                <a href="/about">关于</a>
            </div>
        </nav>

        <div class="hero">
            <h1>全球科技前沿</h1>
            <p>自动聚合全球最新科技资讯、AI突破、开源动态与科技大事件。</p>
            <p class="hero-meta" style="font-size:13px;color:#aaa;margin-top:8px;">来源: Hacker News, TechCrunch, The Verge, Wired, Ars Technica, BBC 等15+源 · 自动更新</p>
        </div>

        <div class="featured-site">
            <div class="featured-inner">
                <div class="featured-icon">✦</div>
                <div class="featured-info">
                    <h3>藏子世间 · 诸天宇宙</h3>
                    <p>一个由 AI 守护的叙事宇宙。命运主角、大圣宇宙、创造独立宇宙——六个入口，六重世界。</p>
                    <a href="https://zishijian.cc" target="_blank" class="featured-link">进入藏子世间 →</a>
                </div>
            </div>
        </div>

        <div class="articles" id="articles">
            <p style="color:#ccc;">加载中...</p>
        </div>

        <footer>
            <span>&copy; 2026 ticalasi</span>
            <div>
                <a href="/privacy">隐私</a>
            </div>
        </footer>
    </div>

    <!-- 资讯流 — 极细自滚动文字条（动态从articles.json生成） -->
    <div class="ticker-wrap" id="ticker-container" style="display:none;">
        <div class="ticker-text" id="ticker-text"></div>
    </div>

    <style>
        .ticker-wrap {
            width: 100%;
            height: 26px;
            background: #1a1a1a;
            overflow: hidden;
            display: flex;
            align-items: center;
            position: relative;
        }
        .ticker-text {
            display: flex;
            gap: 40px;
            white-space: nowrap;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.03em;
            color: #999;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', 'Menlo', monospace;
            animation: ticker-scroll 60s linear infinite;
            padding-left: 20px;
        }
        .ticker-text span {
            color: #555;
            margin-right: 4px;
        }
        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>

    <script>
        // 从 articles.json 加载数据
        fetch('/articles.json')
            .then(r => {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(articles => {
                // 渲染文章列表
                document.getElementById('articles').innerHTML = articles.map(a => `
                    <article onclick="window.open('${a.url.replace(/'/g, "\\'")}','_blank')">
                        <div class="meta">
                            <span>${a.date}</span>
                            <span class="tag">${a.source}</span>
                        </div>
                        <h2><a href="${a.url.replace(/'/g, "\\'")}" target="_blank">${a.title}</a></h2>
                        <p class="summary">${a.summary}</p>
                    </article>
                `).join('');

                // 动态生成跑马灯
                const tickerText = articles.slice(0, 10).map(a =>
                    `<span>◆</span> ${a.title}`
                ).join(' ');
                document.getElementById('ticker-text').innerHTML = tickerText + ' ' + tickerText;
                document.getElementById('ticker-container').style.display = '';
            })
            .catch(err => {
                document.getElementById('articles').innerHTML =
                    '<p style="color:#999;">加载失败，请稍后再试</p>';
                console.error('Failed to load articles:', err);
            });
    </script>
</body>
</html>
