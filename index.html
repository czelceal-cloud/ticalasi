<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ticalasi — AI 前沿</title>
    <meta name="description" content="AI 技术前沿追踪与深度分析。">
    <meta property="og:title" content="ticalasi">
    <meta property="og:description" content="AI 技术前沿追踪与深度分析。">
    <meta name="theme-color" content="#fafafa">
    <link rel="canonical" href="https://ticalasi.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
        }
        .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }

        /* 导航 */
        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 0; border-bottom: 1px solid #e8e8e8; margin-bottom: 80px;
        }
        .logo { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; color: #1a1a1a; text-decoration: none; }
        .nav-links { display: flex; gap: 24px; }
        .nav-links a { font-size: 14px; color: #888; text-decoration: none; transition: color 0.2s; }
        .nav-links a:hover { color: #1a1a1a; }

        /* 头部 */
        .hero { margin-bottom: 64px; }
        .hero h1 { font-size: 40px; font-weight: 700; letter-spacing: -1px; line-height: 1.15; margin-bottom: 16px; }
        .hero p { font-size: 16px; color: #888; max-width: 480px; }

        /* 文章列表 */
        .articles { display: flex; flex-direction: column; gap: 48px; margin-bottom: 80px; }
        article { cursor: pointer; }
        article .meta { font-size: 13px; color: #aaa; margin-bottom: 8px; display: flex; gap: 12px; align-items: center; }
        article .tag { font-size: 11px; color: #666; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        article h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.2px; margin-bottom: 8px; line-height: 1.4; }
        article h2 a { color: #1a1a1a; text-decoration: none; transition: color 0.2s; }
        article h2 a:hover { color: #555; }
        article .summary { font-size: 15px; color: #888; line-height: 1.6; }

        /* Footer */
        footer { border-top: 1px solid #e8e8e8; padding: 32px 0; display: flex; justify-content: space-between; font-size: 13px; color: #aaa; }
        footer a { color: #888; text-decoration: none; }
        footer a:hover { color: #1a1a1a; }

        @media (max-width: 600px) {
            .container { padding: 0 16px; }
            nav { margin-bottom: 48px; }
            .hero h1 { font-size: 28px; }
            .articles { gap: 36px; }
            footer { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="/" class="logo">ticalasi</a>
            <div class="nav-links">
                <a href="/">文章</a>
                <a href="/about">关于</a>
            </div>
        </nav>

        <div class="hero">
            <h1>AI 技术前沿</h1>
            <p>追踪全球人工智能技术发展，提供深度的行业分析与洞察。</p>
        </div>

        <div class="articles" id="articles">
            <p style="color:#ccc;">加载中...</p>
        </div>

        <footer>
            <span>&copy; 2026 ticalasi</span>
            <div>
                <a href="/privacy">隐私</a>
            </div>
        </footer>
    </div>

    <!-- 资讯流 — 极细自滚动文字条 -->
    <div class="ticker-wrap">
        <div class="ticker-text">
            <span>◆</span> DeepSeek V4 Flash 推理速度提升 3 倍
            <span>◆</span> Gemini 2.5 Pro 支持百万级上下文窗口
            <span>◆</span> Claude Opus 4.6 在编程基准测试中再刷新纪录
            <span>◆</span> 开源社区发布首个全自主 AI Agent 框架
            <span>◆</span> AI 芯片初创公司获 20 亿美元新融资
            <span>◆</span> 多模态模型实现视频实时理解与推理
            <span>◆</span> SoulAgent 平台完成三 Agent 自主协作链路
            <span>◆</span> zishijian 观测站上线：三AI命运档案
        </div>
    </div>

    <style>
        .ticker-wrap {
            width: 100%;
            height: 26px;
            background: #1a1a1a;
            overflow: hidden;
            display: flex;
            align-items: center;
            position: relative;
        }
        .ticker-text {
            display: flex;
            gap: 40px;
            white-space: nowrap;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.03em;
            color: #999;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', 'Menlo', monospace;
            animation: ticker-scroll 60s linear infinite;
            padding-left: 20px;
        }
        .ticker-text span {
            color: #555;
            margin-right: 4px;
        }
        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>

    <script>
        const ARTICLES = [
            { id: "001", title: "大模型推理能力提升：新架构突破注意力瓶颈", summary: "动态稀疏注意力机制将推理成本降低40%以上，大规模AI模型部署更加经济可行。", date: "2026.05.03", tag: "大模型" },
            { id: "002", title: "多模态AI模型迎来统一架构时代", summary: "统一Transformer架构在图像、视频、文本间无缝推理，无需为每个任务单独训练。", date: "2026.05.02", tag: "多模态" },
            { id: "003", title: "AI Agent 自主协作系统取得突破", summary: "多Agent协作系统在复杂软件开发任务中自主分工、协调进度并完成交付。", date: "2026.05.01", tag: "Agent" },
            { id: "004", title: "开源LLM性能逼近闭源模型", summary: "开源模型在MMLU等多个基准测试中接近甚至超越部分闭源商业模型。", date: "2026.04.30", tag: "开源" }
        ];

        document.getElementById('articles').innerHTML = ARTICLES.map(a => `
            <article>
                <div class="meta">
                    <span>${a.date}</span>
                    <span class="tag">${a.tag}</span>
                </div>
                <h2><a href="/articles/${a.id}">${a.title}</a></h2>
                <p class="summary">${a.summary}</p>
            </article>
        `).join('');
    </script>
</body>
</html>
